# CI: ビルド + 主張台帳 + 監査スイート + 代表シミュレーション
# 外部クレート依存がないため、キャッシュなしでも高速にビルドできる。
# 省力化 (PROMPT/5):
#   - docs/results 等の記録のみの変更ではスキップ (README・claims.yml 等の
#     ルート台帳が動く統合コミットでは従来どおり走る)
#   - cargo target をキャッシュし、ソース不変ならビルドを即完了させる
#   - Lean 証明 (~3h) は proofs/ 変更時のみ別ワークフロー (lean.yml) で走る
name: CI
on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'
      - 'results/**'
      - 'paper/**'
      - 'figures/**'
      - 'PROMPT/**'
  pull_request:
    paths-ignore:
      - 'docs/**'
      - 'results/**'
      - 'paper/**'
      - 'figures/**'
      - 'PROMPT/**'

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Rust toolchain
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: cargo target キャッシュ (ソース不変ならビルド即完了)
        uses: actions/cache@v4
        with:
          path: sim/target
          key: cargo-target-${{ runner.os }}-${{ hashFiles('sim/Cargo.lock', 'sim/Cargo.toml', 'sim/src/**') }}
          restore-keys: |
            cargo-target-${{ runner.os }}-

      - name: フォーマット検査
        working-directory: sim
        run: cargo fmt --check

      - name: 静的解析 (correctness 系のみゲート)
        working-directory: sim
        run: cargo clippy --release -- -D clippy::correctness

      - name: ビルド (外部依存なし)
        working-directory: sim
        run: cargo build --release

      - name: 主張台帳の機械検証
        run: sim/target/release/v61_ledger

      - name: 主張依存グラフの機械検証 (DAG・等級単調性・Lean 定理数・README 網羅性)
        run: sim/target/release/v151_audit

      - name: 監査スイート (FAIL 時は非ゼロ終了)
        working-directory: sim
        run: |
          ./target/release/v62_atlas
          ./target/release/v63_qnec_budget
          ./target/release/v64_controls
          ./target/release/v65_bayes
          ./target/release/v92_labelstab
          ./target/release/v94_qneccore

      - name: 探索証明書の同一性 (SHA-256)
        run: git diff --exit-code certificates/

      - name: 代表シミュレーション ([FAIL] の検出)
        working-directory: sim
        run: |
          set -e
          for b in v01_qm v01_gr v05_entangle v07_infogeom v08_page; do
            out=$(./target/release/$b)
            echo "$out" | tail -3
            if echo "$out" | grep -q "\[FAIL\]"; then
              echo "::error::$b が FAIL を報告"
              exit 1
            fi
          done

      - name: 機械可読な結果のアップロード
        uses: actions/upload-artifact@v4
        with:
          name: results-json
          path: |
            results/*.json
            certificates/

  dag-prolog:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: SWI-Prolog の導入
        run: sudo apt-get update && sudo apt-get install -y swi-prolog
      - name: 依存グラフの Prolog 推論 (Rust 監査との全数照合)
        run: sh dag/run.sh
      - name: 生成物の同一性 (facts / DOT / Mermaid / MD / JSON)
        run: git diff --exit-code dag/
