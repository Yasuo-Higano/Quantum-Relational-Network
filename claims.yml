# =====================================================================
# QRN 主張台帳 (Claim Ledger) — v6.1 で導入
# =====================================================================
# 本プロジェクトの全主張を、証拠と限界つきで 6 等級に分類する。
# 「どこまでが導出で、どこからが解釈か」を機械可読にすることが目的。
#
#   C0  教科書的・既存定理     : 本プロジェクトが前提として使う確立された結果
#   C1  既存結果の再現実装     : 確立された結果の独立な数値再現 (本リポジトリの計算)
#   C2  制限付き計算定理       : 明示された有限領域内の全数計算で成立する定理
#   C3  toy model による機構提示: 機構が動くことの実演 (現実への適用は仮説)
#   C4  現象論的 fit / 推定    : パラメータを含む一致・オーダー推定
#   C5  解釈・哲学・スローガン : 反証条件を添えた世界像の言明
#
# 書式 (制限 YAML — sim/src/bin/v61_ledger.rs が機械検証する):
#   - id: QRN-<領域>-<3桁>     一意
#     version: "vX.Y"          主張が導入された文書バージョン
#     level: C0..C5
#     claim: "……"              1 行 (日本語)
#     status: "……"             主張の性格の要約
#     inputs:                  (任意) 探索領域・仮定などの入力
#       key: "value"
#     evidence:                code / result / doc のうち 1 つ以上 (実在検査される)
#       code: "sim/src/bin/…"
#       result: "results/…"
#       doc: "docs/…"
#     limitations:             C0 以外は 1 件以上必須
#       - "……"
# =====================================================================

