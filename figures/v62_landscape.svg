<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 360" font-family="Hiragino Sans, Noto Sans CJK JP, sans-serif">
  <!-- v6.2 E1 走査 (大表現込み, ≤6 多重項, |Y|≤3/2, ≤24 成分) の成分数スペクトル。
       一次ソース: results/v62_atlas.txt / certificates/v62_solutions.json -->
  <rect width="640" height="360" fill="#ffffff"/>
  <text x="320" y="28" text-anchor="middle" font-size="16" fill="#111827">理論空間のスペクトル — 無矛盾カイラル物質の解の個数</text>
  <text x="320" y="48" text-anchor="middle" font-size="11" fill="#6b7280">E1 走査: SU(3)≤8・SU(2)≤3 の表現, |Y|≤3/2, ≤6 多重項, ≤24 成分 (v6.2, 全解は certificates/ に SHA-256 つきで保存)</text>

  <!-- 軸 -->
  <line x1="70" y1="300" x2="610" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="70" y1="300" x2="70" y2="90" stroke="#374151" stroke-width="1.5"/>
  <!-- y 目盛 (対数): h(n) = 45*(log10(n)+1) -->
  <g font-size="10" fill="#6b7280" text-anchor="end">
    <text x="64" y="258">1</text><line x1="66" y1="255" x2="610" y2="255" stroke="#e5e7eb"/>
    <text x="64" y="213">10</text><line x1="66" y1="210" x2="610" y2="210" stroke="#e5e7eb"/>
    <text x="64" y="168">100</text><line x1="66" y1="165" x2="610" y2="165" stroke="#e5e7eb"/>
    <text x="64" y="123">1000</text><line x1="66" y1="120" x2="610" y2="120" stroke="#e5e7eb"/>
  </g>
  <text x="24" y="195" font-size="11" fill="#374151" transform="rotate(-90 24 195)">解の個数 (対数)</text>
  <text x="340" y="340" text-anchor="middle" font-size="11" fill="#374151">スペクトルの成分数 (Weyl フェルミオン)</text>

  <!-- 棒: x_i = 80 + 54*(c-15), 幅 40 -->
  <!-- 15: 1 (SM, 強調) -->
  <rect x="80" y="255" width="40" height="45" fill="#2563eb"/>
  <text x="100" y="247" text-anchor="middle" font-size="10" fill="#2563eb" font-weight="bold">1</text>
  <text x="100" y="316" text-anchor="middle" font-size="10" fill="#111827">15</text>
  <text x="100" y="80" text-anchor="middle" font-size="11" fill="#2563eb" font-weight="bold">SM (唯一)</text>
  <line x1="100" y1="84" x2="100" y2="250" stroke="#2563eb" stroke-width="0.75" stroke-dasharray="3 3"/>
  <!-- 16: 8 -->
  <rect x="134" y="214.4" width="40" height="85.6" fill="#9ca3af"/>
  <text x="154" y="206" text-anchor="middle" font-size="10" fill="#374151">8</text>
  <text x="154" y="316" text-anchor="middle" font-size="10" fill="#111827">16</text>
  <!-- 17: 1 -->
  <rect x="188" y="255" width="40" height="45" fill="#9ca3af"/>
  <text x="208" y="247" text-anchor="middle" font-size="10" fill="#374151">1</text>
  <text x="208" y="316" text-anchor="middle" font-size="10" fill="#111827">17</text>
  <!-- 18: 18 -->
  <rect x="242" y="198.5" width="40" height="101.5" fill="#9ca3af"/>
  <text x="262" y="190" text-anchor="middle" font-size="10" fill="#374151">18</text>
  <text x="262" y="316" text-anchor="middle" font-size="10" fill="#111827">18</text>
  <!-- 19-21: 0 -->
  <text x="316" y="292" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="316" y="316" text-anchor="middle" font-size="10" fill="#111827">19</text>
  <text x="370" y="292" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="370" y="316" text-anchor="middle" font-size="10" fill="#111827">20</text>
  <text x="424" y="292" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="424" y="316" text-anchor="middle" font-size="10" fill="#111827">21</text>
  <!-- 22: 2 -->
  <rect x="458" y="241.5" width="40" height="58.5" fill="#9ca3af"/>
  <text x="478" y="233" text-anchor="middle" font-size="10" fill="#374151">2</text>
  <text x="478" y="316" text-anchor="middle" font-size="10" fill="#111827">22</text>
  <!-- 23: 0 -->
  <text x="532" y="292" text-anchor="middle" font-size="10" fill="#9ca3af">0</text>
  <text x="532" y="316" text-anchor="middle" font-size="10" fill="#111827">23</text>
  <!-- 24: 459 -->
  <rect x="556" y="135.3" width="40" height="164.7" fill="#9ca3af"/>
  <text x="576" y="127" text-anchor="middle" font-size="10" fill="#374151">459</text>
  <text x="576" y="316" text-anchor="middle" font-size="10" fill="#111827">24</text>

  <text x="320" y="70" text-anchor="middle" font-size="10.5" fill="#6b7280">15 成分未満: 解なし — SM は最小かつ孤立 (17–21, 23 成分はほぼ空白)</text>
</svg>
