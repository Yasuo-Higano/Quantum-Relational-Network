- id: PRED-001
  title: "BMV 型実験の (C, V) — 相補性円周と位相スケーリング"
  observable: "重力相互作用のみで結合した 2 質量の干渉実験のもつれ C と可視度 V (パラメータ 4 点を登録: m∈{1e-14,1e-15}kg, d∈{200,250}μm, Δx∈{50,100}μm, τ∈{2.5,5}s)"
  qrn_value: "C=|sin Δφ/2|, V=|cos Δφ/2| (C²+V²=1 の円周上)。Δφ=(Gm²τ/ħ)·2Δx²/(d(d²−Δx²)) — 例: (1e-14kg, 200μm, 100μm, 5s) → Δφ=1.055, C=0.503, V=0.864"
  competing: "KTM 型古典チャネル: C=0 かつ V≤e^(−Δφ/2) (同点で 0.590)。古典重力+QFT (Aziz–Howl 2025) はもつれを作りうるため、判別は C>0 の有無でなく (C,V) 平面の位置とスケーリング"
  data_not_used: "実験は未実施 — 全データが holdout"
  falsifier: "予測位相で C≡0 かつ V が古典包絡内 → A2/A3 棄却 (FAL-BMV)"
  source: "v2.5 / v7.3 / v15.7 (再導出回帰つき)"
  status: registered

- id: PRED-002
  title: "|V_td| — 凍結済み幾何湯川模型の holdout 予言"
  observable: "CKM 行列要素 |V_td|"
  qrn_value: "事後帯 (T²×T² M_perm, 9 量学習): 中央値 0.0022, 68% [0.0009, 0.0036], 95% [0.0002, 0.0070]"
  competing: "アナーキー (幅広・無予言), SM (fit であり予言しない)"
  data_not_used: "|V_td| と CP 位相は v7.2 以来一度も尤度に入れていない (v9.1 §限界に明記)"
  falsifier: "測定が 95% 帯の外 → M2 級模型の限界として記録し、幾何拡張の必要条件に変換"
  source: "v15.7 (機構は v10.1 で凍結)"
  status: scored-miss
  score: "測定 0.0086 は帯上端 0.0070 の 1.23 倍外 — 外れ。模型は |V_td| を系統的に小さく出す (CP 位相の欠如と同根の可能性 — PRED-003 参照)"

- id: PRED-003
  title: "Jarlskog 不変量 J — 構造零の発見と窓の反証"
  observable: "CKM の CP 破れ不変量 J = Im(V_us V_cb V*_ub V*_cs)"
  qrn_value: "J = 0 (厳密)。長方形 T²×T² + 実 Wilson 格子の湯川位相は行×列に因子化し、CKM は再位相化で実になる — MAP で |J|=8e-17 (機械零)、事後質量の P(|J|>1e-6)=0"
  competing: "測定 J = 3.08e-5 ≠ 0 (5σ 以上で確立)"
  data_not_used: "J は一度も尤度に入れていない"
  falsifier: "J≠0 の測定は確立済み — この予言は登録と同時に棄却される"
  source: "v15.7"
  status: window-refuted
  score: "決定的乖離 — 「この幾何窓は CP を作れない」が定理的に確定。含意: 傾き磁束/複素構造 (v12.1–v13.2 の非因子化方向) は美的選択ではなく CP 破れの要求である。窓の拡張先が holdout によって指定された"

