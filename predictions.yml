  competing: "測定 γ = 65.9° ± 3.5° (PDG 2024 級)。SM global fit は予言でなく fit"
  data_not_used: "γ (および全 CP 角) は一度も尤度に入れていない (J のみ v16.4 で昇格済み)"
  falsifier: "測度判定 (v17.9) で生存した測度の MAP γ が一様基線より測定から系統的に遠ざかる → 当該測度は S3 違反で棄却"
  source: "v17.9 (登録)"
