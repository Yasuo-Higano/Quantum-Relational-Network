  qrn_value: "自由場 (V=0) では全エネルギー流 J^E_tot が保存量 → χ_00 ∝ q⁴ (p≈4, v26.3 §3 の機構)。相互作用 (V>0) で J^E_tot の保存が壊れ、p は 2 に向かって下がる — 判定: p(V=1.0, 最大 N) < 3.0 で的中"
  competing: "保存則によらない見方 (相互作用を入れても p≈4 のまま) — その場合 v26.3 の機構同定が誤り"
