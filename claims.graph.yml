# =====================================================================
# QRN 主張依存グラフ (Claim Dependency Graph) — v15.1 で導入
# =====================================================================
# claims.yml の全主張に対し、依存 (deps)・仮定 (asm)・反証条件 (fal) を
# 機械可読で与える。v151_audit が以下を検証する:
#   ・claims.yml と 1:1 対応 (過不足なし)
#   ・全参照の実在 (deps → claims / asm → assumptions.yml / fal → falsifiers.yml)
#   ・deps の非循環性 (DAG)
#   ・等級単調性: level(dep) ≤ level(claim) — 計算定理は現象論・解釈に依存しない
#   ・C0 は deps/asm/fal を持たない (外部の確立された前提)
#   ・C1 以上は fal ≥ 1 件 / C2 は window または model の asm ≥ 1 件
#
# 辺の意味論 (重要):
#   deps は「それが落ちればこの主張も落ちる」関係のみ。動機・歴史・引用の
#   辺は張らない (例: v4.3 の全数探索は v2.3 の逆問題に動機づけられたが、
#   v2.3 が誤りでも v4.3 の走査は独立に成立する — 辺なし)。
#   上位主張 (この主張を支えに立つ解釈) は deps の逆向きに機械導出される。
# =====================================================================

