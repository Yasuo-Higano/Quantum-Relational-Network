# =====================================================================
# 測度候補の事前登録台帳 (v17.6 = PROMPT/3 の v18.0)
# =====================================================================
# 問い: 模型空間 Ω (磁束・Wilson 線・世代対・トーラス数・複素構造 τ・Higgs 幅 σ・
# 境界条件・表現) の上に、どの測度を置くべきか — 「なぜその幾何が選ばれるのか」の
# 上位原理への入口 (v16.10 で幾何選択が証拠限界に到達したことで開いた問題)。
#
# 成功条件 (PROMPT/3 §1 — 結果より先に固定。「証拠を上げる」だけでは不十分):
#   S1 データ非参照: 観測値を一切使わずに構成できる (bin/グリッド規約も構成の一部
#      として明示し、規約自由度を数える)
#   S2 規約不変: bin 幅・σ グリッド・格子 N を変えても候補間の順位が保たれる
#   S3 新 holdout に効く: 尤度に入れていない観測量の被覆/精度を悪化させない
#      (改善すれば強い生存、悪化すれば S3 違反で棄却)
# 判定基準 (v15.5 と同一): 生存 ΔlnZ ≥ +1 かつ S1–S3 充足 / 棄却 ΔlnZ ≤ −1
#   または S1–S3 のいずれか違反 / 中間は未決。
# 判定の実施版: 第十八期の測度判定版 (PROMPT/3 の v18.4) で行い、既存証拠
# (v15.5/v16.11–13) は「事前登録前の予備証拠」として引用のみ (再走が正)。
#
# 各候補のフィールド:
#   construction: データ非参照の構成規則 (規約自由度込み)
#   params: 連続/離散パラメータ (marginalize は Occam 罰込み)
#   prior_evidence: 事前登録以前の予備結果 (参考 — 判定には使わない)
#   s_risk: S1–S3 のうち事前に見えているリスク

- id: MSR-UNIFORM
  name: "単純一様測度 (基線)"
  construction: "config の数え上げ測度。規約自由度なし。"
  params: []
  prior_evidence: "全 v10.x–v17.x の基線 (定義上 Δ=0)。"
  s_risk: "なし (基線)。ただし v16.13 の知見では浅い質量比を過剰代表する。"

- id: MSR-JEFFREYS
  name: "Jeffreys/Fisher 測度"
  construction: "モデル多様体の Fisher 計量 √det g から構成。QRN 湯川系では質量対数比空間への誘導計量 — 実装は (a) 厳密 Fisher (パラメータ = 離散 config なので写像 r(c) の局所ヤコビアン近似が要る) か (b) 対数比空間の一様化 (= ヒストグラム平坦化の連続極限) の 2 経路を区別して登録。"
  params: []
  prior_evidence: "v16.13: 2D 対数一様化 (bin 平坦化近似) が Δ+2.9〜+3.1。"
  s_risk: "S1: 離散 config 上の『密度』定義に平滑化規約が要る (bin/カーネル)。S2: bin 幅 3 種で ±0.3 の揺れは確認済みだが格子 N 跨ぎは未検査。"

- id: MSR-MDL
  name: "MDL 測度 (記述長)"
  construction: "離散データの接頭符号長: Wilson 成分 P(0)=1/2, P(k≠0)=1/10 / シアー整数・置換も同型。規約自由度 = 符号表の選択 (明示固定)。"
  params: []
  prior_evidence: "v15.5 未決 (−0.33, rect 9 量)。v16.11 棄却 (−2.16, シアー 10 量 — rect 選好が J の罰を相続)。"
  s_risk: "S3: CP 時代の holdout に対して系統的に不利な方向 (rect/小シアー選好)。符号表の恣意性が S1 の弱点。"

- id: MSR-THERMO
  name: "熱力学的測度 (結合の凝縮)"
  construction: "+γ ln‖Y‖_F (凝縮エネルギーの最小代理)。将来形: 一ループ真空エネルギー (KK 塔込み) への置換 — 置換後は別 id (MSR-THERMO-1L) で登録し直す。"
  params: ["γ ∈ {0.5, 1} (grid marginalize, Occam ln2)"]
  prior_evidence: "v15.5 +0.32 / v16.11 +0.41 — 2 窓で符号再現する唯一の正信号 (どちらも未決)。"
  s_risk: "S1: ‖Y‖_F は模型構造のみ (良)。代理の物理的正当化が弱い (一ループ化が本命)。"

- id: MSR-DEPTH
  name: "深さ傾き測度 exp(βD)"
  construction: "D = −Σ ln(質量比) への指数傾け。"
  params: ["β (連続 — v16.12 で峰 β=1.0, 生存帯 [0.25,1.7], 崩壊 β*=2.0 を測定済み)"]
  prior_evidence: "v16.11 生存 +2.31 (2 点 marg) / v16.12 峰 +3.34。ただし β の値自体が規約 (何が β を選ぶか未解明)。"
  s_risk: "S1: β の選択が事後的になるリスク (峰の β=1 に物理的導出がない限り、S1 は『β を含めて marginalize』でのみ充足)。S2: G0 グリッド条件性 (v16.10)。"

- id: MSR-FLATTEN
  name: "ヒストグラム平坦化測度"
  construction: "config 集団の質量対数比ヒストグラム n̂ に対し w = 1/n̂。規約自由度 = bin 幅・次元 (1D 深さ / 2D 対数比)。"
  params: ["bin 幅 ∈ {0.25, 0.5, 1.0} (規約検査として全て走る)", "次元 ∈ {1D, 2D}"]
  prior_evidence: "v16.13: flat1D Δ+3.29 (β=1 と 0.05 差)・flat2D +2.9。bin 3 種で順位安定は確認済み。"
  s_risk: "S1: bin 規約は構成の一部として明示済みだが、『規約なしの解析形』(PROMPT/3 の v18.2) が本命。S2: 格子 N 跨ぎ・矩形格子での安定性未検査。"

- id: MSR-GAUSSFLAT
  name: "二次傾き測度 (モーメント Gauss 平坦化 — v17.8 で追記)"
  construction: "w = ½ (x−μ)ᵀ Σ⁻¹ (x−μ)、(μ, Σ) は配位集団の標本モーメント。bin なし・フィット自由度ゼロ。"
  params: []
  prior_evidence: "v17.8: 非対称 (36;1,3) で binned flat2D と 0.10 nats 一致 (QQ 0.25)。対角窓では尾がモーメントを破壊し −350 nats 自滅。"
  s_risk: "S2: **資格条件つき — QQ-RMS < 0.6 のモーメント適合窓のみで定義** (対角族では未定義扱い)。判定版はこの資格条件込みで評価する。"

# ---------------------------------------------------------------------
# 判定プロトコル (v18.4 実施版が従う)
# ---------------------------------------------------------------------
# 1. 窓: τ_im 込みの最新最良域 (v17.5 の矩形格子を含む) + 正方 N=36 の 2 窓以上で
#    S2 (窓跨ぎの順位保存) を検査する。
# 2. σ_H は連続周辺化 (v18.1) を先に済ませ、グリッドの影 (v16.10) を除いてから判定。
# 3. S3 の holdout: |V_td|, |V_ts| (既存) に加え、判定前に新規 holdout を
#    predictions.yml に登録してから走る (レプトン混合系が候補 — PROMPT/3 §4)。
# 4. 全候補同時・同一窓・同一プロトコルで nats を測る (個別のつまみ食いをしない)。

# ---------------------------------------------------------------------
# 判定結果 (v17.9 = PROMPT/3 v18.4 — 一次ソース: results/v179_measurejudge.txt)
# ---------------------------------------------------------------------
#   MSR-MDL        棄却 (Δ̄ −1.64, 3 時代目)
#   MSR-THERMO     未決 (Δ̄ +0.49 — 3 窓符号安定・3 時代 5 窓で符号不動。唯一の全検査通過。一ループ化が本命)
#   MSR-DEPTH      棄却 (対角窓の尾で S2 崩壊 — Δ 窓1 +2.84 vs 窓2/3 −494)
#   MSR-FLAT1D     棄却 (窓 3 [τ_im=2/3] で −2.15 に反転 — S2 不安定)
#   MSR-JEFFREYS(b)=FLAT2D 棄却 (同 −0.38 反転 — S2 不安定)
#   MSR-GAUSSFLAT  棄却 (S3 違反 — 資格窓の UT 角 holdout を 1.96→4.53 rad に悪化)
# 構造発見: 測度補正クラスの旧生存 (v16.13) は τ_im=1 断面の幾何病理の補償だった。
# 残高: THERMO 一ループ化 (MSR-THERMO-1L)・τ 分布の上位問題・orientation (UT 角の負符号)。
